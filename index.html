<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>장비 강화 최적 전략 시뮬레이터</title>
  <style>
    :root { --bg:#0b0f17; --card:#121a2a; --text:#e8eefc; --muted:#a9b4d0; --line:#24314d; }
    body { margin:0; font-family:system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width: 980px; margin: 24px auto; padding: 0 16px; }
    h1 { font-size: 20px; margin: 0 0 12px; }
    .sub { color:var(--muted); font-size: 13px; line-height: 1.4; margin: 0 0 18px; }
    .grid { display:grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius: 14px; padding: 14px; box-shadow: 0 8px 20px rgba(0,0,0,.25); }
    .row { display:flex; gap:10px; align-items:center; margin: 10px 0; flex-wrap:wrap; }
    label { font-size: 13px; color: var(--muted); min-width: 120px; }
    input, select { background:#0f1626; color:var(--text); border:1px solid var(--line); border-radius: 10px; padding: 8px 10px; }
    input[type="number"] { width: 110px; }
    .btns { display:flex; gap:10px; flex-wrap:wrap; margin-top: 10px; }
    button { cursor:pointer; border:1px solid var(--line); background:#16223a; color:var(--text);
      padding: 10px 12px; border-radius: 12px; font-weight: 600; }
    button:hover { background:#1b2b49; }
    .pill { display:inline-block; padding: 2px 8px; border:1px solid var(--line); border-radius:999px; font-size:12px; color:var(--muted); }
    .ok { color:#a7f3d0; }
    pre { white-space: pre-wrap; background:#0f1626; border:1px solid var(--line); border-radius: 14px; padding: 12px; margin: 0; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .small { font-size: 12px; color: var(--muted); }
    @media (max-width: 860px){ .grid{ grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>장비 강화 최적 전략 시뮬레이터</h1>
    <p class="sub">
      대성공 확률표를 <b>코드에 정적으로 내장</b>해서, 현재 상태/보유 키트 기준으로 “어떤 키트를 어떤 순서(정책)로 쓰는 게 좋은지”를 계산합니다.<br/>
      기본 최적화: <span class="pill">목표 달성 확률 최우선</span> → 동률이면 <span class="pill">희소(가치) 비용 최소</span>
    </p>

    <div class="grid">
      <div class="card">
        <div class="row">
          <span class="pill ok">확률표 내장됨</span>
        </div>

        <div class="row">
          <label>시작 등급</label>
          <select id="grade">
            <option value="R">R</option>
            <option value="SR">SR</option>
          </select>

          <label>시작 단계</label>
          <input id="stage" type="number" min="0" max="15" value="6"/>

          <label>현재 경험치</label>
          <input id="xp" type="number" min="0" max="2999" value="0"/>
          <span class="small">※ 100단위 권장</span>
        </div>

        <div class="row">
          <label>초급자용</label><input id="bCnt" type="number" min="0" value="15"/>
          <label>중급자용</label><input id="iCnt" type="number" min="0" value="2"/>
          <label>상급자용</label><input id="aCnt" type="number" min="0" value="0"/>
        </div>

        <div class="row">
          <label>목표</label>
          <select id="goalMode">
            <option value="SR15">SR 15단계 도달(최종)</option>
            <option value="NEXT">현재 구간 목표(5/10/15)</option>
          </select>

          <label>우선순위</label>
          <select id="priority">
            <option value="P_FIRST">성공확률 우선(기본)</option>
            <option value="C_FIRST">비용(희소) 우선</option>
          </select>
        </div>

        <div class="row">
          <label>비용(가치) 모델</label>
          <select id="costMode">
            <option value="TOTAL_OVER_REMAIN">남은총량 / 해당키트잔량 (기본)</option>
            <option value="ONE_OVER_REMAIN">1 / 해당키트잔량</option>
          </select>
        </div>

        <div class="row">
          <label>정확 계산 한도</label>
          <input id="stateLimit" type="number" min="100000" step="100000" value="2000000"/>
          <span class="small">상태 수 추정치가 이 값보다 크면 근사(그리디)로 전환</span>
        </div>

        <div class="btns">
          <button id="btnSolve">최적 전략 계산</button>
          <button id="btnSim">몬테카를로(5000회) 검증</button>
        </div>

        <p class="small">
          GitHub Pages에는 <span class="mono">index.html</span>과 <span class="mono">app.js</span>만 올리면 됩니다.
        </p>
      </div>

      <div class="card">
        <h2 style="font-size:16px; margin:0 0 10px;">결과</h2>
        <pre id="out" class="mono">“최적 전략 계산”을 눌러주세요.</pre>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
